apiVersion: apps/v1
kind: Deployment
metadata:
  name: coolkit
  labels:
    app.kubernetes.io/name: coolkit
    app.kubernetes.io/instance: coolkit
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: coolkit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coolkit
        app.kubernetes.io/name: coolkit
        app.kubernetes.io/instance: coolkit
        app.kubernetes.io/managed-by: Helm
    spec:
      terminationGracePeriodSeconds: 30:{% widthratio this_value max_value max_width as width%}
      containers:
        - name: coolkit
          image: "gcr.io/example/coolkit:sha-placeholder"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 2345
          envFrom:
            - configMapRef:
                name: coolkit-config
            - secretRef:
                name: coolkit-secrets
          env:
            - name: PEER_DISOVERY_DNS
              value: http://scaler.production.svc.cluster.local/estimate/coolkit
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
